<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Furgoneta -->
  <rect x="150" y="250" width="500" height="200" rx="20" fill="#8b5cf6"/>
  <rect x="150" y="450" width="500" height="30" rx="15" fill="#6d28d9"/>
  
  <!-- Ventanas -->
  <rect x="180" y="280" width="100" height="80" rx="10" fill="#c4b5fd" opacity="0.7"/>
  <rect x="300" y="280" width="100" height="80" rx="10" fill="#c4b5fd" opacity="0.7"/>
  <rect x="420" y="280" width="100" height="80" rx="10" fill="#c4b5fd" opacity="0.7"/>
  <rect x="540" y="280" width="80" height="80" rx="10" fill="#c4b5fd" opacity="0.7"/>
  
  <!-- Ruedas -->
  <circle cx="250" cy="480" r="50" fill="#1e1b4b"/>
  <circle cx="250" cy="480" r="30" fill="#4b5563"/>
  <circle cx="550" cy="480" r="50" fill="#1e1b4b"/>
  <circle cx="550" cy="480" r="30" fill="#4b5563"/>
  
  <!-- Detalles decorativos -->
  <rect x="150" y="240" width="500" height="10" rx="5" fill="#fbbf24"/>
  
  <!-- Estrellas mágicas -->
  <text x="100" y="150" font-size="60" fill="#fbbf24">✨</text>
  <text x="650" y="200" font-size="50" fill="#ec4899">✨</text>
  <text x="200" y="100" font-size="40" fill="#8b5cf6">⭐</text>
  <text x="600" y="120" font-size="45" fill="#fbbf24">⭐</text>
  
  <!-- Sombrero de mago en el techo -->
  <text x="350" y="240" font-size="80" fill="#1e1b4b">🎩</text>
</svg>
