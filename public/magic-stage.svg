<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Cortina del escenario -->
  <rect x="0" y="0" width="400" height="300" fill="#1e1b4b"/>
  
  <!-- Cortinas laterales -->
  <path d="M 0 0 Q 50 150 0 300 Z" fill="#dc2626" opacity="0.9"/>
  <path d="M 400 0 Q 350 150 400 300 Z" fill="#dc2626" opacity="0.9"/>
  
  <!-- Spotlight -->
  <ellipse cx="200" cy="150" rx="100" ry="80" fill="#fbbf24" opacity="0.3"/>
  <ellipse cx="200" cy="150" rx="60" ry="50" fill="#fff" opacity="0.5"/>
  
  <!-- Sombrero mágico en el centro -->
  <text x="150" y="180" font-size="100" fill="#000">🎩</text>
  
  <!-- Varita mágica -->
  <line x1="180" y1="200" x2="250" y2="150" stroke="#fff" stroke-width="4"/>
  <circle cx="250" cy="150" r="8" fill="#fbbf24"/>
  
  <!-- Estrellas mágicas -->
  <text x="250" y="120" font-size="30" fill="#fbbf24">✨</text>
  <text x="120" y="140" font-size="25" fill="#ec4899">✨</text>
  <text x="280" y="180" font-size="20" fill="#8b5cf6">✨</text>
</svg>
